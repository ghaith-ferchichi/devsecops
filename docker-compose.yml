services:

  # ==================== LLM Server ====================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_METRICS=true
      # ── CPU inference tuning ──────────────────────────────────────────────
      # Flash Attention: O(n²)→O(n) memory complexity — critical for 16K ctx
      - OLLAMA_FLASH_ATTENTION=1
      # Quantise KV cache to 8-bit: halves KV RAM (~650 MB saved at 16K ctx)
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Pin to all 12 Haswell cores; Ollama auto-selects libggml-cpu-haswell.so
      - OLLAMA_NUM_THREAD=12
      # Only one model loaded at a time — all RAM to the active model
      - OLLAMA_MAX_LOADED_MODELS=1
      # One concurrent request — all 12 cores dedicated to a single inference
      - OLLAMA_NUM_PARALLEL=1
      # Keep model hot for 20 min (client keep_alive overrides per-request)
      - OLLAMA_KEEP_ALIVE=20m
    volumes:
      - ollama_data:/root/.ollama
    shm_size: '2gb'              # shared memory for thread sync buffers (was 64 MB)
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 42g            # raised: 14B=11 GB + 16K KV≈1.3 GB + OS headroom
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== AI Agent ====================
  agent:
    build: ./agent
    container_name: devsecops-agent
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./agent/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_workspace:/tmp/agent-workspace
      - ./artifacts:/opt/devsecops/artifacts
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== Cache ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== CI/CD ====================
  jenkins:
    build: ./jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== Reverse Proxy ====================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - agent
      - jenkins
      - grafana
      - open-webui
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== Node Exporter (host metrics) ====================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # Must run in host PID + network namespace to see all host processes and interfaces
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  # ==================== Monitoring ====================
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - victoriametrics_data:/storage
    command:
      - '--storageDataPath=/storage'
      - '--retentionPeriod=90d'
      - '--httpListenAddr=:8428'
    restart: unless-stopped
    networks:
      - devsecops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://141.94.92.226/prometheus/'
      - '--web.route-prefix=/prometheus/'
    depends_on:
      - alertmanager
    restart: unless-stopped
    networks:
      - devsecops-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://141.94.92.226/alertmanager/'
      - '--web.route-prefix=/alertmanager/'
    restart: unless-stopped
    networks:
      - devsecops-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=http://141.94.92.226/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - devsecops-net

  # ==================== Ollama Web UI ====================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3001:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-generate-a-real-secret}
      - ENABLE_OLLAMA_API=true
      # Disable signup after first admin account is created
      - ENABLE_SIGNUP=true
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devsecops-net

# ==================== Network ====================
networks:
  devsecops-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== Volumes ====================
volumes:
  ollama_data:
  postgres_data:
  redis_data:
  jenkins_data:
  agent_workspace:
  prometheus_data:
  grafana_data:
  victoriametrics_data:
  open_webui_data:
