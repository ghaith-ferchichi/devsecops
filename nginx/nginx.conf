events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS — re-resolves upstream IPs on each request
    # Prevents 502s when containers are recreated and get new IPs
    resolver 127.0.0.11 valid=10s;

    upstream agent {
        server devsecops-agent:8000;
    }
    upstream jenkins {
        server jenkins:8080;
    }
    upstream grafana {
        server grafana:3000;
    }
    upstream prometheus {
        server prometheus:9090;
    }

    # ── HTTP server ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        client_max_body_size 50m;

        # ── Root redirect → Chat UI ───────────────────────────────────
        location = / {
            return 301 /ui;
        }

        # ── Chat UI ──────────────────────────────────────────────────
        # Protected by HTTP Basic Auth — credentials in /etc/nginx/.htpasswd
        location = /ui {
            auth_basic "BTE Security AI Agent";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://agent/ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Chat API (models list + SSE stream) ───────────────────────
        # SSE requires: no buffering, HTTP/1.1, long timeout
        # Auth required — same credentials as /ui
        location /chat/ {
            auth_basic "BTE Security AI Agent";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://agent/chat/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 1800s;   # 30 min — covers 32B model cold-load + generation
            proxy_send_timeout 1800s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ── General agent API ─────────────────────────────────────────
        location /api/ {
            proxy_pass http://agent/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
        }

        # ── GitHub webhook ────────────────────────────────────────────
        location = /webhooks/github {
            proxy_pass http://agent/webhooks/github;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
            proxy_set_header X-GitHub-Event $http_x_github_event;
            proxy_set_header X-GitHub-Delivery $http_x_github_delivery;
            proxy_read_timeout 30s;
        }

        # ── Slack callback ────────────────────────────────────────────
        location = /callbacks/slack {
            proxy_pass http://agent/callbacks/slack;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        # ── Health ────────────────────────────────────────────────────
        location /health {
            proxy_pass http://agent/health;
        }

        # ── Jenkins ───────────────────────────────────────────────────
        location /jenkins/ {
            proxy_pass http://jenkins/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect http://jenkins:8080/ /jenkins/;
        }

        # ── Grafana ───────────────────────────────────────────────────
        # WebSocket headers required for Grafana live-streaming dashboards
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Prometheus ────────────────────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Port 443 — no TLS certificate configured ──────────────────────────
    # Port 443 is exposed in docker-compose but SSL is not configured.
    # This block silently closes connections (444) to avoid nginx errors.
    # To enable HTTPS: add ssl_certificate + ssl_certificate_key and
    # change 444 to the proper proxy_pass blocks above.
    server {
        listen 443;
        server_name _;
        return 444;
    }
}
