global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alert rules ───────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.rules.yml

# ── AlertManager ─────────────────────────────────────────────────────────
# AlertManager runs with --web.route-prefix=/alertmanager/
# so all API paths are prefixed — must set path_prefix here too
alerting:
  alertmanagers:
    - path_prefix: /alertmanager/
      static_configs:
        - targets: ['alertmanager:9093']

remote_write:
  - url: http://victoriametrics:8428/api/v1/write

scrape_configs:
  - job_name: 'devsecops-agent'
    metrics_path: /metrics
    static_configs:
      - targets: ['devsecops-agent:8000']
        labels:
          service: 'agent'

  - job_name: 'node-exporter'
    static_configs:
      # node-exporter runs with network_mode:host — reach it via Docker bridge gateway
      - targets: ['172.20.0.1:9100']
        labels:
          instance: 'vps-main'

  - job_name: 'prometheus'
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'alertmanager'
    metrics_path: /alertmanager/metrics
    static_configs:
      - targets: ['alertmanager:9093']
